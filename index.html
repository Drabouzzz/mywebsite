<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You caaa</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(270deg, #ffd6e7, #ffeaf4, #ffd6e7);
  background-size:600% 600%;
  animation: gradientMove 12s ease infinite;
  overflow:hidden;
}

@keyframes gradientMove{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* TRANSISI MASUK (CURTAIN STYLE SOFT BLOOM) */
.loader{
  position:fixed;
  inset:0;
  background:#ffeaf4;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  animation: openReveal 2s ease forwards;
}

@keyframes openReveal{
  0%{clip-path:circle(100% at 50% 50%)}
  100%{clip-path:circle(0% at 50% 50%);opacity:0;visibility:hidden}
}

.container{
  text-align:center;
  animation:fadeIn 1.5s ease;
  position:relative;
  z-index:2;
}

h1{
  font-family:'Great Vibes',cursive;
  font-size:40px;
  color:#d63384;
  animation:float 3s ease-in-out infinite;
}

p{
  font-size:14px;
  margin-top:10px;
  color:#555;
}

.credit{
  font-size:12px;
  margin-top:8px;
  color:#888;
  opacity:0;
  animation:fadeIn 2s ease forwards;
  animation-delay:2.5s;
}

.btn{
  display:inline-block;
  margin-top:25px;
  padding:10px 20px;
  border-radius:20px;
  background:#ff85a2;
  color:white;
  text-decoration:none;
  font-size:14px;
  animation:pulse 2s infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}

@keyframes pulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.08)}
  100%{transform:scale(1)}
}

@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}

/* SHIMMER */
.shimmer{
  position:fixed;
  top:0;
  left:-100%;
  width:200%;
  height:100%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.25), transparent);
  animation: shimmerMove 6s infinite;
  pointer-events:none;
  z-index:1;
}

@keyframes shimmerMove{
  0%{left:-100%}
  100%{left:100%}
}

/* SPARKLE */
.sparkle{
  position:fixed;
  width:4px;
  height:4px;
  background:white;
  border-radius:50%;
  opacity:0.7;
  animation: sparkleBlink 2s infinite ease-in-out;
  z-index:1;
}

@keyframes sparkleBlink{
  0%,100%{opacity:0.2;transform:scale(0.8)}
  50%{opacity:1;transform:scale(1.4)}
}

/* FLOATING SYMBOL */
.symbol{
  position:absolute;
  font-size:14px;
  animation:floatUp linear infinite;
  opacity:0.7;
}

@keyframes floatUp{
  from{transform:translateY(100vh) scale(0.6) rotate(0deg);opacity:0}
  to{transform:translateY(-10vh) scale(1) rotate(360deg);opacity:1}
}

/* GLOW */
.glow{
  position:absolute;
  width:120px;
  height:120px;
  background:rgba(255,182,193,0.4);
  border-radius:50%;
  filter:blur(60px);
  animation:moveGlow 10s infinite alternate ease-in-out;
}

@keyframes moveGlow{
  from{transform:translate(-50px,-50px)}
  to{transform:translate(50px,50px)}
}

</style>
</head>
<body>

<div class="loader"></div>
<div class="shimmer"></div>

<div class="glow" style="top:20%;left:10%;"></div>
<div class="glow" style="bottom:10%;right:15%;"></div>

<script>
// sparkle
for(let i=0;i<50;i++){
  let s=document.createElement("div");
  s.className="sparkle";
  s.style.top=Math.random()*100+"vh";
  s.style.left=Math.random()*100+"vw";
  s.style.animationDuration=(1.5+Math.random()*2)+"s";
  document.body.appendChild(s);
}

// symbol
const icons=["✨","🌸","⭐","💫"];
for(let i=0;i<25;i++){
  let s=document.createElement("div");
  s.className="symbol";
  s.innerHTML=icons[Math.floor(Math.random()*icons.length)];
  s.style.left=Math.random()*100+"vw";
  s.style.animationDuration=(5+Math.random()*5)+"s";
  document.body.appendChild(s);
}

// typing
const text1="Welcome,";
const text2="Baca teks arahan dari atas ya";
let i=0,j=0;

function typeTitle(){
  if(i<text1.length){
    document.getElementById("typing").innerHTML+=text1.charAt(i);
    i++;
    setTimeout(typeTitle,120);
  }else setTimeout(typeSub,600);
}

function typeSub(){
  if(j<text2.length){
    document.getElementById("subtext").innerHTML+=text2.charAt(j);
    j++;
    setTimeout(typeSub,80);
  }
}

window.onload=typeTitle;
</script>

<div class="container">
  <h1 id="typing"></h1>
  <p id="subtext"></p>
  <div class="credit">made by @fwznnn</div>
  <a href="main.html" class="btn">continue</a>
</div>

</body>
</html>
